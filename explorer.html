<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standalone File Tree Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #121824;
      --bg-tertiary: #1e2538;
      --border-color: #2b364e;
      --accent-cyan: #06b6d4;
      --accent-cyan-hover: #0891b2;
      --accent-green: #10b981;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-radius: 12px;
      --transition: 0.15s ease;
    }

    :root.light-mode {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --border-color: #cbd5e1;
      --accent-cyan: #0891b2;
      --accent-cyan-hover: #0369a1;
      --accent-green: #059669;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      padding: 2.5rem 1.5rem;
      transition: background-color var(--transition), color var(--transition);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent-cyan) 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-primary);
      background-color: var(--bg-secondary);
      border-color: var(--border-color);
    }

    .btn:hover {
      background-color: var(--bg-tertiary);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan) 0%, #0284c7 100%);
      color: white;
      border: none;
      box-shadow: 0 4px 10px rgba(6, 182, 212, 0.15);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-icon {
      padding: 0.6rem;
      aspect-ratio: 1/1;
      justify-content: center;
    }

    .current-dir-banner {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
    }

    @media (max-width: 600px) {
      .current-dir-banner {
        flex-direction: column;
        align-items: stretch;
      }
    }

    .dir-info {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      overflow: hidden;
    }

    .dir-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .dir-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--accent-cyan);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Prefix Selector Panel */
    .prefix-panel {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .prefix-panel label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .prefix-input {
      flex-grow: 1;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      transition: border-color var(--transition);
    }

    .prefix-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    /* Controls Panel */
    .controls-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 768px) {
      .controls-panel {
        grid-template-columns: 1fr;
      }
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input {
      width: 100%;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 0.625rem 1rem 0.625rem 2.25rem;
      font-size: 0.9rem;
      transition: border-color var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .search-icon {
      position: absolute;
      left: 0.8rem;
      color: var(--text-secondary);
    }

    .options-wrapper {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Toggle Switch */
    .toggle-container {
      display: flex;
      align-items: center;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.3rem;
      gap: 0.2rem;
    }

    .toggle-btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .toggle-btn.active {
      background-color: var(--accent-cyan);
      color: white;
    }

    /* File Tree Section */
    .tree-container {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1.5rem 1rem;
      min-height: 400px;
      max-height: 60vh;
      overflow-y: auto;
    }

    .tree-node {
      display: flex;
      flex-direction: column;
      margin-left: 1.25rem;
    }

    .tree-node-root {
      margin-left: 0;
    }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--transition);
      user-select: none;
    }

    .tree-row:hover {
      background-color: var(--bg-tertiary);
    }

    .folder-arrow {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: transform var(--transition);
      cursor: pointer;
    }

    .tree-row.collapsed .folder-arrow {
      transform: rotate(-90deg);
    }

    .node-icon {
      width: 16px;
      height: 16px;
      color: var(--accent-cyan);
      flex-shrink: 0;
    }

    .node-icon.file {
      color: var(--text-secondary);
    }

    .node-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      flex-grow: 1;
      word-break: break-all;
    }

    .copy-badge {
      font-size: 0.65rem;
      background-color: rgba(6, 182, 212, 0.1);
      color: var(--accent-cyan);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      border: 1px solid rgba(6, 182, 212, 0.2);
      opacity: 0;
      transition: opacity var(--transition);
      flex-shrink: 0;
    }

    .tree-row:hover .copy-badge {
      opacity: 1;
    }

    .tree-children {
      display: flex;
      flex-direction: column;
    }

    .tree-row.collapsed + .tree-children {
      display: none;
    }

    .hidden-node {
      display: none !important;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-icon {
      margin-bottom: 1rem;
      color: var(--text-muted);
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .toast {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--accent-green);
      color: var(--text-primary);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-width: 300px;
      max-width: 450px;
      transform: translateY(1rem);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .toast button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 1.1rem;
      margin-left: 1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-cyan);">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>File Tree Explorer</span>
      </h1>
      <div class="header-actions">
        <!-- Theme Toggle -->
        <button id="theme-btn" class="btn btn-icon" title="Toggle Theme">
          <svg class="theme-icon sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Folder Pick Button / Banner -->
    <div class="current-dir-banner">
      <div class="dir-info">
        <span class="dir-label">Active Directory</span>
        <span class="dir-path" id="dir-display">No folder selected</span>
      </div>
      
      <!-- Hidden Webkitdirectory folder input -->
      <input type="file" id="folder-picker" webkitdirectory directory multiple style="display: none;">
      
      <button id="pick-dir-btn" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="12" y1="8" x2="12" y2="16"></line>
          <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
        <span>Select Folder</span>
      </button>
    </div>

    <!-- Optional Absolute Path Prefix Configurer -->
    <div class="prefix-panel" id="prefix-panel" style="display: none;">
      <label for="prefix-input">Absolute Prefix (Optional):</label>
      <input type="text" id="prefix-input" class="prefix-input" placeholder="e.g. C:/projects/my-app (used for Absolute Path copy mode)">
    </div>

    <div class="controls-panel" id="controls-panel" style="display: none;">
      <!-- Search -->
      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search files and folders...">
      </div>
      <!-- Mode & Utility toggles -->
      <div class="options-wrapper">
        <button id="expand-all-btn" class="btn" title="Expand All Folders">Expand All</button>
        <button id="collapse-all-btn" class="btn" title="Collapse All Folders">Collapse All</button>
        <div class="toggle-container">
          <button id="mode-rel-btn" class="toggle-btn active">Relative Path</button>
          <button id="mode-abs-btn" class="toggle-btn">Absolute Path</button>
        </div>
      </div>
    </div>

    <!-- Tree View -->
    <div class="tree-container" id="tree-container">
      <div class="empty-state" id="initial-empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <h3>No Folder Loaded</h3>
        <p style="margin-top: 0.5rem; max-width: 360px;">
          Click the "Select Folder" button above to choose a directory on your computer to recursively scan and explore.
        </p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    let currentTree = [];
    let copyMode = 'relative'; // 'relative' or 'absolute'
    let selectedFolderName = '';
    
    // DOM Cache
    const dirDisplay = document.getElementById('dir-display');
    const folderPicker = document.getElementById('folder-picker');
    const pickDirBtn = document.getElementById('pick-dir-btn');
    const prefixPanel = document.getElementById('prefix-panel');
    const prefixInput = document.getElementById('prefix-input');
    const controlsPanel = document.getElementById('controls-panel');
    const searchInput = document.getElementById('search-input');
    const expandAllBtn = document.getElementById('expand-all-btn');
    const collapseAllBtn = document.getElementById('collapse-all-btn');
    const modeRelBtn = document.getElementById('mode-rel-btn');
    const modeAbsBtn = document.getElementById('mode-abs-btn');
    const treeContainer = document.getElementById('tree-container');
    const toastContainer = document.getElementById('toast-container');
    const themeBtn = document.getElementById('theme-btn');

    // 1. Theme handler
    themeBtn.addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-mode');
    }

    // 2. Toast alerts
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<span>${message}</span><button>&times;</button>`;
      
      toast.querySelector('button').addEventListener('click', () => {
        toast.classList.remove('visible');
        setTimeout(() => toast.remove(), 300);
      });
      
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('visible'), 10);
      setTimeout(() => {
        if (toast.parentNode) {
          toast.classList.remove('visible');
          setTimeout(() => toast.remove(), 300);
        }
      }, 3500);
    }

    // 3. Copy to Clipboard
    function copyText(text, successMsg) {
      navigator.clipboard.writeText(text).then(() => {
        showToast(successMsg);
      }).catch(err => {
        console.error(err);
        showToast("Clipboard copy failed!");
      });
    }

    // 4. Mode toggle
    modeRelBtn.addEventListener('click', () => {
      copyMode = 'relative';
      modeRelBtn.classList.add('active');
      modeAbsBtn.classList.remove('active');
    });
    modeAbsBtn.addEventListener('click', () => {
      copyMode = 'absolute';
      modeAbsBtn.classList.add('active');
      modeRelBtn.classList.remove('active');
    });

    // 5. Expand & Collapse
    expandAllBtn.addEventListener('click', () => {
      document.querySelectorAll('.tree-row').forEach(row => {
        row.classList.remove('collapsed');
      });
    });
    collapseAllBtn.addEventListener('click', () => {
      document.querySelectorAll('.tree-row').forEach(row => {
        if (row.getAttribute('data-type') === 'directory') {
          row.classList.add('collapsed');
        }
      });
    });

    // 6. Micro-interaction animation
    function triggerBadgeSuccess(btn) {
      const originalText = btn.textContent;
      btn.textContent = "✓ Copied";
      btn.style.color = "var(--accent-green)";
      btn.style.borderColor = "rgba(16, 185, 129, 0.3)";
      btn.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
      
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.color = "";
        btn.style.borderColor = "";
        btn.style.backgroundColor = "";
      }, 1200);
    }

    // 7. Parse FileList into Hierarchical Tree
    function buildTreeFromPaths(files) {
      const root = { name: "Root", type: "directory", children: {} };
      const ignoreDirs = ['.git', 'venv', '.venv', 'env', '__pycache__', '.idea', '.vscode'];
      
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const path = file.webkitRelativePath.replace(/\\/g, '/'); // e.g. "my-folder/sub/file.txt"
        const parts = path.split('/');
        
        // Skip hidden folders and specific ignored names
        let skip = false;
        for (const part of parts) {
          if (part.startsWith('.') || ignoreDirs.includes(part)) {
            skip = true;
            break;
          }
        }
        if (skip) continue;
        
        let current = root;
        let accumulatedPath = '';
        
        for (let j = 0; j < parts.length; j++) {
          const part = parts[j];
          // We strip the root folder name from the relative path for copying,
          // so paths start directly with subfolders/files.
          const relParts = parts.slice(1);
          const relPath = relParts.slice(0, j).join('/');
          
          if (j === parts.length - 1) {
            // File
            current.children[part] = {
              name: part,
              path: relParts.join('/'),
              type: "file"
            };
          } else {
            // Directory
            if (!current.children[part]) {
              current.children[part] = {
                name: part,
                path: relParts.slice(0, j + 1).join('/'),
                type: "directory",
                children: {}
              };
            }
            current = current.children[part];
          }
        }
      }
      
      // Convert children objects to sorted arrays recursively
      function convertChildrenToArray(node) {
        if (node.type === "directory" && node.children) {
          const childrenArray = Object.values(node.children);
          childrenArray.forEach(convertChildrenToArray);
          // Sort directories first
          childrenArray.sort((a, b) => (a.type !== 'directory') - (b.type !== 'directory') || a.name.localeCompare(b.name));
          node.children = childrenArray;
        }
      }
      
      convertChildrenToArray(root);
      return Object.values(root.children);
    }    // Helper to generate a simple nested list representation of the EXPOSED directory tree from DOM
    function getVisibleHierarchyText(treeNodeEl, indent = 0) {
      let row = null;
      let childrenContainer = null;
      
      // Strict immediate child lookup to avoid deep-nested querySelector matches
      for (let i = 0; i < treeNodeEl.children.length; i++) {
        const child = treeNodeEl.children[i];
        if (child.classList.contains('tree-row')) {
          row = child;
        } else if (child.classList.contains('tree-children')) {
          childrenContainer = child;
        }
      }
      
      if (!row || row.classList.contains('hidden-node')) return '';
      
      const name = row.querySelector('.node-name').textContent;
      const type = row.getAttribute('data-type');
      const spaces = '  '.repeat(indent);
      
      let result = `${spaces}${name}${type === 'directory' ? '/' : ''}\n`;
      
      // Only traverse children if this directory is NOT collapsed in the UI
      if (type === 'directory' && !row.classList.contains('collapsed') && childrenContainer) {
        for (let i = 0; i < childrenContainer.children.length; i++) {
          const childNode = childrenContainer.children[i];
          if (childNode.classList.contains('tree-node')) {
            result += getVisibleHierarchyText(childNode, indent + 1);
          }
        }
      }
      return result;
    }

    // 8. Tree Renderer
    function renderTree(tree) {
      treeContainer.innerHTML = '';
      
      if (tree.length === 0) {
        treeContainer.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:3rem;">No files found matching criteria.</div>';
        return;
      }
      
      function createNode(node) {
        const nodeEl = document.createElement('div');
        nodeEl.className = 'tree-node';
        
        const rowEl = document.createElement('div');
        rowEl.className = 'tree-row';
        rowEl.setAttribute('data-path', node.path);
        rowEl.setAttribute('data-type', node.type);
        
        let arrowHTML = '<div class="folder-arrow"></div>';
        let iconHTML = '';
        
        if (node.type === 'directory') {
          arrowHTML = `
            <div class="folder-arrow">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
          `;
          iconHTML = `
            <svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          `;
        } else {
          iconHTML = `
            <svg class="node-icon file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
          `;
        }
        
        const badgeText = node.type === 'directory' ? 'Copy Tree' : 'Copy Path';
        rowEl.innerHTML = `
          ${arrowHTML}
          ${iconHTML}
          <span class="node-name">${node.name}</span>
          <span class="copy-badge">${badgeText}</span>
        `;
        
        nodeEl.appendChild(rowEl);
        
        if (node.type === 'directory' && node.children) {
          const childrenEl = document.createElement('div');
          childrenEl.className = 'tree-children';
          node.children.forEach(child => {
            childrenEl.appendChild(createNode(child));
          });
          nodeEl.appendChild(childrenEl);
          
          // Collapse / Expand toggle
          const toggles = rowEl.querySelectorAll('.folder-arrow, .node-icon');
          toggles.forEach(el => {
            el.addEventListener('click', (e) => {
              e.stopPropagation();
              rowEl.classList.toggle('collapsed');
            });
          });
        }
        
        // Copy action click handler
        rowEl.addEventListener('click', (e) => {
          if (e.target.closest('.folder-arrow') || e.target.closest('.node-icon')) {
            return;
          }
          
          if (node.type === 'directory') {
            const listText = getVisibleHierarchyText(nodeEl, 0);
            copyText(listText.trim(), `Copied exposed directory tree structure!`);
          } else {
            const relPath = rowEl.getAttribute('data-path');
            let finalPath = relPath;
            if (copyMode === 'absolute') {
              const prefix = prefixInput.value.replace(/\\/g, '/').replace(/\/$/, '');
              finalPath = prefix ? `${prefix}/${relPath}` : relPath;
            }
            copyText(finalPath, `Copied ${copyMode} path!`);
          }
          triggerBadgeSuccess(rowEl.querySelector('.copy-badge'));
        });
        
        return nodeEl;
      }
      
      
      tree.forEach(node => {
        const root = createNode(node);
        root.classList.add('tree-node-root');
        treeContainer.appendChild(root);
      });
    }

    // 9. Input select directory triggers
    pickDirBtn.addEventListener('click', () => {
      folderPicker.click();
    });

    folderPicker.addEventListener('change', (e) => {
      const files = e.target.files;
      if (files.length === 0) return;
      
      // Extract root directory name
      const firstPath = files[0].webkitRelativePath;
      selectedFolderName = firstPath.split('/')[0];
      
      dirDisplay.textContent = selectedFolderName;
      
      // Parse list to Tree
      currentTree = buildTreeFromPaths(files);
      
      // Show controls and panels
      prefixPanel.style.display = 'flex';
      controlsPanel.style.display = 'grid';
      
      // Render tree
      renderTree(currentTree);
      
      // Clear search
      searchInput.value = '';
      
      showToast(`Scanned and loaded ${files.length} files successfully!`);
    });

    // 10. Real-time Search filter
    function filterTree(query) {
      const term = query.toLowerCase().trim();
      const rows = document.querySelectorAll('.tree-row');
      
      if (!term) {
        rows.forEach(row => {
          row.classList.remove('hidden-node');
          const children = row.nextElementSibling;
          if (children && children.classList.contains('tree-children')) {
            children.classList.remove('hidden-node');
          }
        });
        return;
      }
      
      // Hide all first
      rows.forEach(row => {
        row.classList.add('hidden-node');
        const children = row.nextElementSibling;
        if (children && children.classList.contains('tree-children')) {
          children.classList.add('hidden-node');
        }
      });
      
      // Reveal matches and expand branches
      rows.forEach(row => {
        const name = row.querySelector('.node-name').textContent.toLowerCase();
        if (name.includes(term)) {
          row.classList.remove('hidden-node');
          
          let parentNode = row.parentElement;
          while (parentNode && parentNode.classList.contains('tree-node')) {
            const parentRow = parentNode.querySelector('.tree-row');
            if (parentRow) {
              parentRow.classList.remove('hidden-node');
              parentRow.classList.remove('collapsed');
              const parentChildren = parentRow.nextElementSibling;
              if (parentChildren) {
                parentChildren.classList.remove('hidden-node');
              }
            }
            parentNode = parentNode.parentElement.closest('.tree-node');
          }
          
          const children = row.nextElementSibling;
          if (children && children.classList.contains('tree-children')) {
            children.classList.remove('hidden-node');
            children.querySelectorAll('.tree-row').forEach(childRow => {
              childRow.classList.remove('hidden-node');
            });
          }
        }
      });
    }

    searchInput.addEventListener('input', () => {
      filterTree(searchInput.value);
    });
  </script>
</body>
</html>
